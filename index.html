<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLaborate | 專業財務管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .status-pill { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .currency-font { font-family: 'Inter', sans-serif; font-weight: 700; }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col">
        <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i data-lucide="layout-dashboard" size="24"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800">KOLaborate</h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest leading-none">Financial Tracking</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="fetchData()" class="text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 border border-indigo-200">
                    <i data-lucide="refresh-cw" size="18"></i> 同步最新財務資料
                </button>
            </div>
        </nav>

        <main class="flex-1 p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-5">
                    <div class="bg-indigo-100 p-3 rounded-xl text-indigo-600"><i data-lucide="play-circle" size="28"></i></div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">進行中團購</p>
                        <p id="stat-active" class="text-3xl font-black text-slate-800">--</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-5 border-l-4 border-l-blue-400">
                    <div class="bg-blue-100 p-3 rounded-xl text-blue-600"><i data-lucide="shopping-cart" size="28"></i></div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">本月總銷售額</p>
                        <p id="stat-sales" class="text-3xl font-black text-slate-800">--</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-5 border-l-4 border-l-emerald-400">
                    <div class="bg-emerald-100 p-3 rounded-xl text-emerald-600"><i data-lucide="banknote" size="28"></i></div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">預計支出分潤</p>
                        <p id="stat-profit" class="text-3xl font-black text-slate-800">--</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 py-4 border-b border-slate-100">
                    <div class="relative w-80">
                        <i data-lucide="search" class="absolute left-4 top-3 text-slate-400" size="18"></i>
                        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="快速搜尋團主或 IG..." class="pl-12 pr-6 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[1000px]">
                        <thead>
                            <tr class="bg-slate-50/50">
                                <th class="px-8 py-4 text-[11px] font-bold text-slate-400 uppercase">團主資訊</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase">期間</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-right">銷售金額</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-right">分潤金額</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-center">進度</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="drawer" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleDrawer()"></div>
        <div id="drawerContent" class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl translate-x-full transition-transform duration-300 overflow-y-auto p-8">
            <h2 class="text-2xl font-bold text-slate-800 mb-8 flex items-center gap-2"><i data-lucide="file-text"></i> 團務詳細記錄</h2>
            <div id="drawerBody" class="space-y-6">
                </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- 請在此貼上妳的 SheetDB API 網址 ---
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/cyqmbi2i9zshu'; 

        let allData = [];

        async function fetchData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="6" class="px-8 py-10 text-center text-slate-400">正在同步雲端財務資料...</td></tr>';
            
            try {
                const response = await fetch(SHEETDB_URL);
                allData = await response.json();
                renderTable(allData);
                updateStats(allData);
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-8 py-10 text-center text-red-500">同步失敗！請確認 SheetDB 是否正常。</td></tr>';
            }
        }

        // 格式化金錢 (加上逗號與 $ 符號)
        function formatMoney(num) {
            return '$' + (Number(num) || 0).toLocaleString();
        }

        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            data.forEach(item => {
                const row = `
                    <tr class="hover:bg-indigo-50/20 transition group">
                        <td class="px-8 py-6">
                            <p class="font-bold text-slate-800">${item.name}</p>
                            <p class="text-xs text-indigo-500 font-medium">${item.ig}</p>
                        </td>
                        <td class="px-6 py-6 text-xs font-semibold text-slate-500">${item.date_start} - ${item.date_end}</td>
                        <td class="px-6 py-6 text-right font-bold text-slate-700 currency-font">${formatMoney(item.sales_amount)}</td>
                        <td class="px-6 py-6 text-right font-bold text-emerald-600 currency-font">${formatMoney(item.profit_amount)}</td>
                        <td class="px-6 py-6 text-center">
                            <span class="status-pill ${item.status_labor === '已回簽' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                ${item.status_labor}
                            </span>
                        </td>
                        <td class="px-6 py-6 text-right">
                            <button onclick="toggleDrawer('${item.name}', '${item.referrer}', '${item.remark}', '${item.sales_amount}', '${item.profit_amount}', '${item.phone}')" class="text-indigo-600 font-bold text-xs bg-indigo-50 px-4 py-2 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">管理</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
            lucide.createIcons();
        }

        function updateStats(data) {
            const totalSales = data.reduce((sum, i) => sum + (Number(i.sales_amount) || 0), 0);
            const totalProfit = data.reduce((sum, i) => sum + (Number(i.profit_amount) || 0), 0);
            
            document.getElementById('stat-active').innerText = data.length + ' 檔';
            document.getElementById('stat-sales').innerText = formatMoney(totalSales);
            document.getElementById('stat-profit').innerText = formatMoney(totalProfit);
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(i => i.name.toLowerCase().includes(val) || i.ig.toLowerCase().includes(val));
            renderTable(filtered);
        }

        function toggleDrawer(name, referrer, remark, sales, profit, phone) {
            const drawer = document.getElementById('drawer');
            const content = document.getElementById('drawerContent');
            if (drawer.classList.contains('invisible')) {
                document.getElementById('drawerBody').innerHTML = `
                    <div class="bg-slate-50 p-5 rounded-2xl space-y-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">團主姓名</p>
                        <p class="font-bold text-xl text-slate-800">${name}</p>
                        <p class="text-sm text-slate-500"><i data-lucide="phone" size="12" class="inline"></i> ${phone || '--'}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-blue-50 p-4 rounded-xl">
                            <p class="text-[10px] font-bold text-blue-400">銷售額</p>
                            <p class="font-bold text-lg text-blue-800">${formatMoney(sales)}</p>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-xl">
                            <p class="text-[10px] font-bold text-emerald-400">分潤金</p>
                            <p class="font-bold text-lg text-emerald-800">${formatMoney(profit)}</p>
                        </div>
                    </div>
                    <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                        <p class="text-[10px] font-bold text-indigo-400 uppercase mb-2">邀約記錄</p>
                        <p class="font-bold text-indigo-900 text-sm mb-1">負責人：${referrer || '未設定'}</p>
                        <p class="text-sm text-indigo-700 leading-relaxed italic">${remark || '無備註。'}</p>
                    </div>
                `;
                lucide.createIcons();
                drawer.classList.remove('invisible');
                setTimeout(() => content.classList.remove('translate-x-full'), 10);
            } else {
                content.classList.add('translate-x-full');
                setTimeout(() => drawer.classList.add('invisible'), 300);
            }
        }

        fetchData();
    </script>
</body>
</html>
