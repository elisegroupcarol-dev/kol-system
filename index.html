<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLaborate | 專業財務與全月曆管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .status-pill { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 800; }
        .tab-active { background-color: #4f46e5; color: white; shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4); }
        .currency-font { font-family: 'Inter', sans-serif; font-weight: 800; }
        .modal-blur { backdrop-filter: blur(8px); background-color: rgba(15, 23, 42, 0.5); }
        .calendar-line { height: 4px; border-radius: 2px; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col">
        <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="calendar-days" size="24"></i></div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 tracking-tight">KOLaborate</h1>
                    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest leading-none">Visual Scheduler</p>
                </div>
            </div>
            <button onclick="openModal('add')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition flex items-center gap-2 shadow-md">
                <i data-lucide="plus" size="18"></i> 新增開團名單
            </button>
        </nav>

        <main class="flex-1 p-8 space-y-6 max-w-7xl mx-auto w-full">
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

            <div class="flex flex-wrap justify-between items-center gap-4">
                <div id="monthTabs" class="flex gap-2 overflow-x-auto pb-2"></div>
                <button id="calBtn" onclick="toggleCalendar()" class="hidden bg-white text-indigo-600 border border-indigo-200 px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-50 transition flex items-center gap-2">
                    <i data-lucide="calendar"></i> 查看本月排程表
                </button>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <div class="relative w-full max-w-md">
                        <i data-lucide="search" class="absolute left-4 top-3 text-slate-400" size="18"></i>
                        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋姓名、負責人..." class="pl-12 pr-6 py-2.5 bg-white border border-slate-200 rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[11px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <th class="px-8 py-5">團主資訊</th>
                                <th class="px-6 py-5">團購日期 / 負責人</th>
                                <th class="px-6 py-5 text-right">銷售 / 分潤 (20%)</th>
                                <th class="px-6 py-5 text-center">勞報狀態</th>
                                <th class="px-8 py-5 text-center">管理</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="calModal" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 modal-blur" onclick="toggleCalendar()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl bg-white rounded-3xl shadow-2xl p-8 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 id="calTitle" class="text-xl font-bold text-slate-800">月排程視圖</h3>
                <button onclick="toggleCalendar()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <div id="calContainer" class="overflow-y-auto max-h-[60vh] space-y-4">
                </div>
        </div>
    </div>

    <div id="dataModal" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 modal-blur" onclick="closeModal()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl transition-transform duration-300 translate-x-full p-8 overflow-y-auto" id="modalContent">
            <h2 id="modalTitle" class="text-2xl font-bold text-slate-800 mb-8">資料管理</h2>
            <form id="dataForm" onsubmit="handleFormSubmit(event)" class="space-y-6">
                <input type="hidden" name="original_name" id="original_name">
                <div class="space-y-4">
                    <div class="p-5 bg-slate-50 rounded-2xl border space-y-4">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">基本資訊</p>
                        <input type="text" name="name" id="f_name" placeholder="姓名" required class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <input type="text" name="ig" id="f_ig" placeholder="IG 帳號" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm outline-none">
                        <input type="text" name="phone" id="f_phone" placeholder="電話號碼" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm outline-none">
                    </div>
                    <div class="p-5 bg-emerald-50/50 rounded-2xl border border-emerald-100 space-y-4">
                        <p class="text-[10px] font-bold text-emerald-600 uppercase">財務記錄 (20% 自動)</p>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" name="sales_amount" id="f_sales" oninput="autoCalcProfit(this.value)" placeholder="銷售額" class="bg-white border rounded-xl p-3 text-sm font-bold outline-none">
                            <input type="number" name="profit_amount" id="f_profit" readonly placeholder="分潤金" class="bg-slate-100 border rounded-xl p-3 text-sm font-bold text-emerald-600 outline-none">
                        </div>
                    </div>
                    <div class="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-4">
                        <p class="text-[10px] font-bold text-indigo-500 uppercase">邀約與日期</p>
                        <input type="text" name="referrer" id="f_referrer" placeholder="負責邀約人" class="w-full bg-white border rounded-xl p-3 text-sm outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" name="date_start" id="f_start" placeholder="開始 YYYY/MM/DD" class="bg-white border rounded-xl p-3 text-sm outline-none">
                            <input type="text" name="date_end" id="f_end" placeholder="結束 YYYY/MM/DD" class="bg-white border rounded-xl p-3 text-sm outline-none">
                        </div>
                        <select name="status_labor" id="f_status" class="w-full bg-white border rounded-xl p-3 text-sm outline-none">
                            <option value="未發送">未發送</option>
                            <option value="已發送">已發送</option>
                            <option value="已回簽">已回簽</option>
                        </select>
                    </div>
                    <textarea name="remark" id="f_remark" placeholder="備註..." rows="3" class="w-full bg-slate-100 border-none rounded-2xl p-4 text-sm outline-none"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg transition">儲存資料並同步雲端</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/cyqmbi2i9zshu'; 

        let allData = [];
        let currentMonth = 'All';

        async function fetchData() {
            try {
                const response = await fetch(SHEETDB_URL);
                allData = await response.json();
                renderTabs(allData);
                filterAndRender();
            } catch (error) { console.error(error); }
        }

        function renderTabs(data) {
            const tabsContainer = document.getElementById('monthTabs');
            const months = ['All', ...new Set(data.map(item => (item.date_start || '').substring(0, 7)).filter(m => m.length === 7).sort().reverse())];
            tabsContainer.innerHTML = months.map(m => `
                <button onclick="setMonth('${m}')" class="px-5 py-2 rounded-xl text-sm font-bold transition-all border ${currentMonth === m ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}">
                    ${m === 'All' ? '全部' : m.split('/')[1] + '月'}
                </button>
            `).join('');
            document.getElementById('calBtn').classList.toggle('hidden', currentMonth === 'All');
        }

        function setMonth(m) { currentMonth = m; renderTabs(allData); filterAndRender(); }

        function filterAndRender() {
            let filtered = currentMonth === 'All' ? allData : allData.filter(i => i.date_start && i.date_start.startsWith(currentMonth));
            renderTable(filtered);
            renderStats(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-slate-50/80 transition">
                    <td class="px-8 py-5">
                        <p class="font-black text-slate-800 text-base leading-none mb-1">${item.name}</p>
                        <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-wider">${item.ig || '@unknown'}</p>
                    </td>
                    <td class="px-6 py-5">
                        <p class="text-sm font-black text-slate-900 leading-none mb-1">${item.date_start || '--'} ~ ${item.date_end || '--'}</p>
                        <p class="text-[10px] text-slate-400 font-bold">負責人：${item.referrer || '未設定'}</p>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <p class="text-[10px] font-bold text-slate-400">$${(Number(item.sales_amount)||0).toLocaleString()}</p>
                        <p class="text-base font-black text-emerald-600 tracking-tighter currency-font">$${(Number(item.profit_amount)||0).toLocaleString()}</p>
                    </td>
                    <td class="px-6 py-5 text-center">
                        <span class="status-pill ${item.status_labor === '已回簽' ? 'bg-green-100 text-green-700' : (item.status_labor === '已發送' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700')}">${item.status_labor}</span>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <button onclick="openModal('edit', ${allData.indexOf(item)})" class="p-2.5 text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all"><i data-lucide="edit-3" size="20"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function renderStats(data) {
            const sales = data.reduce((s, i) => s + (Number(i.sales_amount)||0), 0);
            const profit = data.reduce((s, i) => s + (Number(i.profit_amount)||0), 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">期間銷售</p><p class="text-3xl font-black text-slate-800">$${sales.toLocaleString()}</p></div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm border-emerald-400 border-l-4"><p class="text-[10px] font-bold text-emerald-500 uppercase mb-1">期間分潤</p><p class="text-3xl font-black text-emerald-600">$${profit.toLocaleString()}</p></div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm border-indigo-400 border-l-4"><p class="text-[10px] font-bold text-indigo-500 uppercase mb-1">名單檔數</p><p class="text-3xl font-black text-indigo-600">${data.length} Cases</p></div>
            `;
        }

        // 月曆視覺化邏輯
        function toggleCalendar() {
            const modal = document.getElementById('calModal');
            if (modal.classList.contains('invisible')) {
                const container = document.getElementById('calContainer');
                const filtered = allData.filter(i => i.date_start && i.date_start.startsWith(currentMonth));
                document.getElementById('calTitle').innerText = `${currentMonth} 團購排程表`;
                
                container.innerHTML = filtered.map(item => {
                    const s = parseInt(item.date_start.split('/')[2]) || 1;
                    const e = parseInt(item.date_end.split('/')[2]) || 30;
                    const width = ((e - s + 1) / 31) * 100;
                    const left = ((s - 1) / 31) * 100;
                    return `
                        <div class="space-y-1">
                            <div class="flex justify-between text-[10px] font-bold text-slate-400"><span>${item.name}</span><span>${item.date_start} - ${item.date_end}</span></div>
                            <div class="w-full bg-slate-100 h-6 rounded-lg relative overflow-hidden">
                                <div class="absolute h-full bg-indigo-500 rounded-lg flex items-center px-2 text-[9px] text-white font-bold" style="left:${left}%; width:${width}%">${item.name}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                modal.classList.remove('invisible');
            } else { modal.classList.add('invisible'); }
        }

        function autoCalcProfit(val) { document.getElementById('f_profit').value = Math.round((parseFloat(val) || 0) * 0.2); }

        function openModal(mode, index = null) {
            const modal = document.getElementById('dataModal');
            const content = document.getElementById('modalContent');
            document.getElementById('dataForm').reset();
            if (mode === 'edit') {
                const item = allData[index];
                document.getElementById('modalTitle').innerText = '編輯名單';
                document.getElementById('original_name').value = item.name;
                document.getElementById('f_name').value = item.name;
                document.getElementById('f_ig').value = item.ig;
                document.getElementById('f_phone').value = item.phone;
                document.getElementById('f_sales').value = item.sales_amount;
                document.getElementById('f_profit').value = item.profit_amount;
                document.getElementById('f_start').value = item.date_start;
                document.getElementById('f_end').value = item.date_end;
                document.getElementById('f_status').value = item.status_labor;
                document.getElementById('f_referrer').value = item.referrer;
                document.getElementById('f_remark').value = item.remark;
            }
            modal.classList.remove('invisible');
            setTimeout(() => content.classList.remove('translate-x-full'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('dataModal');
            const content = document.getElementById('modalContent');
            content.classList.add('translate-x-full');
            setTimeout(() => modal.classList.add('invisible'), 300);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalName = document.getElementById('original_name').value;
            const data = Object.fromEntries(new FormData(e.target).entries());
            btn.innerText = '同步中...'; btn.disabled = true;
            try {
                if (originalName) {
                    await fetch(`${SHEETDB_URL}/name/${encodeURIComponent(originalName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: data })
                    });
                } else {
                    await fetch(SHEETDB_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: [data] }) });
                }
                closeModal(); fetchData();
            } catch (error) { alert('失敗'); }
            btn.innerText = '儲存資料並更新雲端'; btn.disabled = false;
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(i => (i.name && i.name.toLowerCase().includes(val)) || (i.referrer && i.referrer.toLowerCase().includes(val)));
            renderTable(filtered);
        }

        fetchData();
    </script>
</body>
</html>
