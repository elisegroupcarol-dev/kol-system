<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLaborate | 專業財務與二審管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .status-pill { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 800; }
        .tab-active { background-color: #4f46e5; color: white; shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4); }
        .modal-blur { backdrop-filter: blur(10px); background-color: rgba(15, 23, 42, 0.4); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #e2e8f0; border: 1px solid #e2e8f0; }
        .calendar-day { min-height: 100px; background-color: white; padding: 4px; overflow-y: auto; }
        .event-bar { font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .currency-font { font-family: 'Inter', sans-serif; font-weight: 800; }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col">
        <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg"><i data-lucide="shield-check" size="24"></i></div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 tracking-tight">KOLaborate <span class="text-indigo-600">2026</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none">Annual Performance & Audit</p>
                </div>
            </div>
            <button onclick="openModal('add')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition flex items-center gap-2 shadow-md">
                <i data-lucide="plus" size="18"></i> 新增開團名單
            </button>
        </nav>

        <main class="flex-1 p-8 space-y-6 max-w-7xl mx-auto w-full">
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

            <div class="flex flex-wrap justify-between items-center gap-4">
                <div id="monthTabs" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"></div>
                <button id="calBtn" onclick="toggleCalendar()" class="hidden bg-indigo-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-indigo-700 transition flex items-center gap-2 shadow-lg">
                    <i data-lucide="calendar-range" size="18"></i> 查看圖示化月曆
                </button>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <div class="relative w-full max-w-md">
                        <i data-lucide="search" class="absolute left-4 top-3 text-slate-400" size="18"></i>
                        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="搜尋姓名、負責人..." class="pl-12 pr-6 py-2.5 bg-white border border-slate-200 rounded-2xl text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[900px]">
                        <thead>
                            <tr class="text-[11px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <th class="px-8 py-5">團主資訊</th>
                                <th class="px-6 py-5">團購排期 / 負責人</th>
                                <th class="px-6 py-5 text-right">銷售 / 分潤 (20%)</th>
                                <th class="px-6 py-5 text-center">審核 / 勞報狀態</th>
                                <th class="px-8 py-5 text-center">管理</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="calModal" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 modal-blur" onclick="toggleCalendar()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[95%] max-w-5xl bg-white rounded-3xl shadow-2xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="calTitle" class="text-2xl font-black text-slate-800">月排程視圖</h3>
                <button onclick="toggleCalendar()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-400 uppercase mb-1">
                <div>週一</div><div>週二</div><div>週三</div><div>週四</div><div>週五</div><div>週六</div><div class="text-red-400">週日</div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
        </div>
    </div>

    <div id="dataModal" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 modal-blur" onclick="closeModal()"></div>
        <div id="modalContent" class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl transition-transform duration-300 translate-x-full p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modalTitle" class="text-2xl font-bold text-slate-800">KOL 管理卡片</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400"><i data-lucide="x"></i></button>
            </div>
            
            <form id="dataForm" onsubmit="handleFormSubmit(event)" class="space-y-6">
                <input type="hidden" name="original_name" id="original_name">
                
                <div class="space-y-4">
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 space-y-4 shadow-sm">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">基本聯繫</label>
                        <input type="text" name="name" id="f_name" placeholder="姓名" required class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <input type="text" name="ig" id="f_ig" placeholder="IG 帳號 (@...)" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm outline-none">
                        <input type="text" name="phone" id="f_phone" placeholder="電話號碼" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm outline-none">
                    </div>
                    
                    <div class="p-5 bg-emerald-50/50 rounded-2xl border border-emerald-100 space-y-4 shadow-sm">
                        <label class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">財務結算與審核</label>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[9px] text-slate-400 mb-1 block font-bold">銷售金額</label>
                                <input type="number" name="sales_amount" id="f_sales" oninput="autoCalcProfit(this.value)" placeholder="0" class="w-full bg-white border rounded-xl p-3 text-sm font-bold outline-none">
                            </div>
                            <div>
                                <label class="text-[9px] text-slate-400 mb-1 block font-bold">分潤 (20%)</label>
                                <input type="number" name="profit_amount" id="f_profit" readonly class="w-full bg-slate-100 border rounded-xl p-3 text-sm font-bold text-emerald-600">
                            </div>
                        </div>
                        <div class="space-y-2 pt-2 border-t border-emerald-100">
                            <label class="text-[9px] text-slate-400 font-bold block">二審財務狀態 (審核結果)</label>
                            <select name="audit_status" id="f_audit" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none text-slate-700">
                                <option value="待審核">待審核</option>
                                <option value="結算無誤ok">結算無誤ok</option>
                                <option value="金額有誤 ng">金額有誤 ng</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 space-y-4 shadow-sm">
                        <label class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">排期與勞報狀態</label>
                        <input type="text" name="referrer" id="f_referrer" placeholder="負責邀約人" class="w-full bg-white border rounded-xl p-3 text-sm outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[9px] text-slate-400 mb-1 block font-bold">開始日期</label>
                                <input type="date" name="date_start" id="f_start" required class="w-full bg-white border rounded-xl p-3 text-sm outline-none">
                            </div>
                            <div>
                                <label class="text-[9px] text-slate-400 mb-1 block font-bold">結束日期</label>
                                <input type="date" name="date_end" id="f_end" required class="w-full bg-white border rounded-xl p-3 text-sm outline-none">
                            </div>
                        </div>
                        <select name="status_labor" id="f_status" class="w-full bg-white border rounded-xl p-3 text-sm outline-none font-bold text-slate-600">
                            <option value="未發送">未發送</option>
                            <option value="已發送">已發送</option>
                            <option value="已回簽">已回簽</option>
                        </select>
                    </div>

                    <textarea name="remark" id="f_remark" placeholder="備註紀錄與不合格原因..." rows="3" class="w-full bg-slate-100 border-none rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg transition hover:bg-indigo-700 active:scale-95">儲存並同步至雲端</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // --- 請務必在這裡更換為妳的 SheetDB API 網址 ---
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/cyqmbi2i9zshu'; 

        let allData = [];
        let currentMonth = 'All';

        // 月份拆解與正序邏輯
        function getMonthKey(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split(/[\/\-]/);
            if (parts.length < 2) return null;
            return parts[0] + '/' + parts[1].padStart(2, '0');
        }

        async function fetchData() {
            try {
                const response = await fetch(SHEETDB_URL);
                allData = await response.json();
                renderTabs(allData);
                filterAndRender();
            } catch (error) { console.error('同步失敗', error); }
        }

        function renderTabs(data) {
            const tabsContainer = document.getElementById('monthTabs');
            // 月份正向排序 (1月到12月)
            const months = ['All', ...new Set(data.map(item => getMonthKey(item.date_start)).filter(m => m !== null).sort())];
            tabsContainer.innerHTML = months.map(m => {
                const display = m === 'All' ? '全部名單' : parseInt(m.split('/')[1]) + '月';
                return `<button onclick="setMonth('${m}')" class="px-5 py-2 rounded-xl text-sm font-bold border transition-all ${currentMonth === m ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}">${display}</button>`;
            }).join('');
            document.getElementById('calBtn').classList.toggle('hidden', currentMonth === 'All');
        }

        function setMonth(m) { currentMonth = m; renderTabs(allData); filterAndRender(); }

        function filterAndRender() {
            let filtered = currentMonth === 'All' ? allData : allData.filter(i => getMonthKey(i.date_start) === currentMonth);
            renderTable(filtered);
            renderStats(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((item, index) => {
                const auditClass = item.audit_status === '結算無誤ok' ? 'text-green-600' : (item.audit_status === '金額有誤 ng' ? 'text-red-600' : 'text-slate-300');
                return `
                <tr class="hover:bg-slate-50/80 transition group">
                    <td class="px-8 py-5">
                        <p class="font-black text-slate-800 text-base leading-none mb-1">${item.name}</p>
                        <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-wider">${item.ig || '@unknown'}</p>
                    </td>
                    <td class="px-6 py-5">
                        <p class="text-lg font-black text-slate-900 leading-none mb-1">${(item.date_start||'').replace(/-/g,'/')} ~ ${(item.date_end||'').replace(/-/g,'/')}</p>
                        <p class="text-[10px] text-slate-400 font-bold">負責人：${item.referrer || '未設定'}</p>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <p class="text-[10px] font-bold text-slate-400">$${(Number(item.sales_amount)||0).toLocaleString()}</p>
                        <p class="text-base font-black text-emerald-600 tracking-tighter currency-font">$${(Number(item.profit_amount)||0).toLocaleString()}</p>
                    </td>
                    <td class="px-6 py-5 text-center space-y-2">
                        <div class="flex items-center justify-center gap-1 text-[9px] font-black uppercase ${auditClass}">
                            <i data-lucide="${item.audit_status === '結算無誤ok' ? 'shield-check' : (item.audit_status === '金額有誤 ng' ? 'shield-alert' : 'shield-minus')}" size="12"></i>
                            ${item.audit_status || '未審核'}
                        </div>
                        <span class="status-pill inline-block ${item.status_labor === '已回簽' ? 'bg-green-100 text-green-700' : (item.status_labor === '已發送' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700')}">${item.status_labor}</span>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <button onclick="openModal('edit', ${allData.indexOf(item)})" class="p-2.5 text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all shadow-sm">
                            <i data-lucide="edit-3" size="22"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
            lucide.createIcons();
        }

        function renderStats(data) {
            const sales = data.reduce((s, i) => s + (Number(i.sales_amount)||0), 0);
            const profit = data.reduce((s, i) => s + (Number(i.profit_amount)||0), 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-widest">本期累積銷售</p><p class="text-3xl font-black text-slate-800">$${sales.toLocaleString()}</p></div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-400"><p class="text-[10px] font-bold text-emerald-500 uppercase mb-1 tracking-widest">累積預計分潤</p><p class="text-3xl font-black text-emerald-600">$${profit.toLocaleString()}</p></div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-400"><p class="text-[10px] font-bold text-indigo-500 uppercase mb-1 tracking-widest">本月合作檔數</p><p class="text-3xl font-black text-indigo-600">${data.length} Cases</p></div>
            `;
        }

        function toggleCalendar() {
            const modal = document.getElementById('calModal');
            if (modal.classList.contains('invisible')) {
                renderGrid();
                modal.classList.remove('invisible');
            } else { modal.classList.add('invisible'); }
        }

        function renderGrid() {
            const grid = document.getElementById('calendarGrid');
            const [year, month] = currentMonth.split('/');
            document.getElementById('calTitle').innerText = `${parseInt(month)}月 團購排程表`;
            const firstDay = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();
            const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            grid.innerHTML = '';
            for(let i=0; i<startOffset; i++) grid.innerHTML += '<div class="calendar-day bg-slate-50/50"></div>';
            const filteredKOLs = allData.filter(i => getMonthKey(i.date_start) === currentMonth);
            const colors = ['#dbeafe', '#dcfce7', '#fef9c3', '#ffedd5', '#f3e8ff'];
            for(let d=1; d<=daysInMonth; d++) {
                let events = '';
                filteredKOLs.forEach((kol, idx) => {
                    const parts = kol.date_start.split(/[\/\-]/);
                    const s = parseInt(parts[2]);
                    const e = parseInt(kol.date_end.split(/[\/\-]/)[2]);
                    if (d >= s && d <= e) events += `<div class="event-bar" style="background-color: ${colors[idx % colors.length]}">${kol.name}</div>`;
                });
                grid.innerHTML += `<div class="calendar-day"><span class="text-[10px] font-black text-slate-300">${d}</span><div class="mt-1">${events}</div></div>`;
            }
            lucide.createIcons();
        }

        function autoCalcProfit(val) { document.getElementById('f_profit').value = Math.round((parseFloat(val) || 0) * 0.2); }

        // 核心修正：開啟管理彈窗的邏輯
        function openModal(mode, index = null) {
            const modal = document.getElementById('dataModal');
            const content = document.getElementById('modalContent');
            const form = document.getElementById('dataForm');
            form.reset();
            
            if (mode === 'edit' && index !== null) {
                const item = allData[index];
                document.getElementById('modalTitle').innerText = '管理 KOL 詳情';
                document.getElementById('original_name').value = item.name;
                
                // 填入既有資料
                document.getElementById('f_name').value = item.name || '';
                document.getElementById('f_ig').value = item.ig || '';
                document.getElementById('f_phone').value = item.phone || '';
                document.getElementById('f_sales').value = item.sales_amount || '';
                document.getElementById('f_profit').value = item.profit_amount || '';
                document.getElementById('f_audit').value = item.audit_status || '待審核';
                document.getElementById('f_start').value = (item.date_start || '').replace(/\//g,'-');
                document.getElementById('f_end').value = (item.date_end || '').replace(/\//g,'-');
                document.getElementById('f_status').value = item.status_labor || '未發送';
                document.getElementById('f_referrer').value = item.referrer || '';
                document.getElementById('f_remark').value = item.remark || '';
            } else {
                document.getElementById('modalTitle').innerText = '新增開團名單';
                document.getElementById('original_name').value = '';
            }

            modal.classList.remove('invisible');
            setTimeout(() => content.classList.remove('translate-x-full'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('dataModal');
            const content = document.getElementById('modalContent');
            content.classList.add('translate-x-full');
            setTimeout(() => modal.classList.add('invisible'), 300);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalName = document.getElementById('original_name').value;
            const data = Object.fromEntries(new FormData(e.target).entries());
            data.date_start = data.date_start.replace(/-/g, '/');
            data.date_end = data.date_end.replace(/-/g, '/');
            
            btn.innerText = '正在雲端存檔...'; btn.disabled = true;
            try {
                // 如果是編輯模式，使用 PATCH；如果是新增模式，使用 POST
                const url = originalName ? `${SHEETDB_URL}/name/${encodeURIComponent(originalName)}` : SHEETDB_URL;
                const method = originalName ? 'PATCH' : 'POST';
                const body = originalName ? { data: data } : { data: [data] };
                
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                closeModal(); 
                fetchData(); // 重新抓取資料
            } catch (error) { alert('同步失敗，請檢查網路！'); }
            btn.innerText = '儲存資料並更新雲端'; btn.disabled = false;
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(i => (i.name && i.name.toLowerCase().includes(val)) || (i.referrer && i.referrer.toLowerCase().includes(val)));
            renderTable(filtered);
        }

        // 初始抓取資料
        fetchData();
    </script>
</body>
</html>
