<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLaborate | 雲端一體化管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .status-pill { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .currency-font { font-family: 'Inter', sans-serif; font-weight: 700; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col">
        <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i data-lucide="layout-dashboard" size="24"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800">KOLaborate</h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest leading-none">Management System</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 shadow-lg shadow-indigo-200">
                    <i data-lucide="plus-circle" size="18"></i> 新增名單
                </button>
                <button onclick="fetchData()" class="text-slate-500 hover:bg-slate-50 p-2 rounded-lg transition">
                    <i data-lucide="refresh-cw" size="18"></i>
                </button>
            </div>
        </nav>

        <main class="flex-1 p-8 space-y-6">
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 py-4 border-b border-slate-100">
                    <div class="relative w-full max-w-md">
                        <i data-lucide="search" class="absolute left-4 top-3 text-slate-400" size="18"></i>
                        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="快速搜尋團主..." class="pl-12 pr-6 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50/50">
                                <th class="px-8 py-4 text-[11px] font-bold text-slate-400 uppercase">團主資訊</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-right">銷售/分潤</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-center">進度</th>
                                <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="addModal" class="fixed inset-0 z-50 invisible transition-all duration-300">
        <div class="absolute inset-0 modal-bg" onclick="closeAddModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bg-white rounded-3xl shadow-2xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">新增團主名單</h2>
                <button onclick="closeAddModal()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <form id="addForm" onsubmit="submitForm(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="name" placeholder="團主姓名" required class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="text" name="ig" placeholder="IG 帳號 (@...)" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <input type="text" name="phone" placeholder="電話" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="date_start" placeholder="開始日期" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="text" name="date_end" placeholder="結束日期" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" name="sales_amount" placeholder="銷售金額" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="number" name="profit_amount" placeholder="分潤金額" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select name="status_labor" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none">
                        <option value="未發送">未發送</option>
                        <option value="已發送">已發送</option>
                        <option value="已回簽">已回簽</option>
                    </select>
                    <input type="text" name="referrer" placeholder="負責邀約人" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none">
                </div>
                <textarea name="remark" placeholder="備註說明" rows="2" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">確認新增名單</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const SHEETDB_URL = 'https://sheetdb.io/api/v1/cyqmbi2i9zshu'; // <--- 貼上妳的 API 網址

        let allData = [];

        async function fetchData() {
            try {
                const response = await fetch(SHEETDB_URL);
                allData = await response.json();
                renderTable(allData);
                renderStats(allData);
            } catch (error) { console.error('Error:', error); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50/50 transition">
                    <td class="px-8 py-5">
                        <p class="font-bold text-slate-800">${item.name}</p>
                        <p class="text-[10px] text-indigo-500 uppercase font-bold tracking-wider">${item.ig}</p>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <p class="text-xs font-bold text-slate-700">$${(Number(item.sales_amount)||0).toLocaleString()}</p>
                        <p class="text-[10px] font-bold text-emerald-500 tracking-tighter">$${(Number(item.profit_amount)||0).toLocaleString()}</p>
                    </td>
                    <td class="px-6 py-5 text-center">
                        <span class="status-pill ${item.status_labor === '已回簽' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${item.status_labor}</span>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="alert('備註：'+'${item.remark}')" class="p-2 hover:bg-slate-100 rounded-lg transition text-slate-400"><i data-lucide="more-horizontal" size="16"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function renderStats(data) {
            const totalSales = data.reduce((s, i) => s + (Number(i.sales_amount)||0), 0);
            const totalProfit = data.reduce((s, i) => s + (Number(i.profit_amount)||0), 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm"><p class="text-xs font-bold text-slate-400 uppercase mb-2">本月總銷售</p><p class="text-3xl font-black text-slate-800">$${totalSales.toLocaleString()}</p></div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-400"><p class="text-xs font-bold text-slate-400 uppercase mb-2">預計發放分潤</p><p class="text-3xl font-black text-emerald-600">$${totalProfit.toLocaleString()}</p></div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-indigo-400"><p class="text-xs font-bold text-slate-400 uppercase mb-2">目前檔數</p><p class="text-3xl font-black text-indigo-600">${data.length} 檔</p></div>
            `;
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('invisible'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('invisible'); }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = '正在寫入資料庫...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [data] })
                });
                alert('新增成功！資料已導入 Google 試算表。');
                e.target.reset();
                closeAddModal();
                fetchData();
            } catch (error) { alert('新增失敗，請檢查網路連線。'); }
            btn.innerText = '確認新增名單';
            btn.disabled = false;
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(i => i.name.toLowerCase().includes(val) || i.ig.toLowerCase().includes(val));
            renderTable(filtered);
        }

        fetchData();
    </script>
</body>
</html>
